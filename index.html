<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小鸡生日派对</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4/face_mesh.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.4/dist/gsap.min.js"></script>
    <style>
        * { touch-action: manipulation; -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; }
        body, html { margin: 0; padding: 0; overflow: hidden; background: #1a1a1a; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #canvas-container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 10; }
        #ui-layer { position: absolute; top: 20px; left: 0; width: 100%; z-index: 20; pointer-events: none; text-align: center; }
        .hint-card { background: rgba(0,0,0,0.6); color: white; padding: 10px 20px; border-radius: 20px; display: inline-block; backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.2); transition: all 0.5s ease; }
        #loading-screen { position: fixed; inset: 0; background: #facc15; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #854d0e; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #854d0e; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loading-screen">
    <div class="loader"></div>
    <h2 class="text-2xl font-bold">正在加载生日魔法...</h2>
    <p class="mt-2 opacity-75">正在初始化摄像头和AI模型</p>
    <button id="start-btn" style="margin-top:24px;padding:12px 32px;font-size:1.1rem;font-weight:600;border:none;border-radius:999px;background:#854d0e;color:#facc15;cursor:pointer;display:none" onclick="this.style.display='none';startCamera()">🎉 点击启动摄像头</button>
</div>

<div id="ui-layer">
    <div id="hint" class="hint-card text-lg font-medium">初始化中...</div>
</div>

<div id="canvas-container">
    <canvas id="output_canvas"></canvas>
</div>

<script>
    const canvasElement = document.getElementById('output_canvas');
    const ctx = canvasElement.getContext('2d');
    const hintElement = document.getElementById('hint');
    const loadingScreen = document.getElementById('loading-screen');

    let state = 'WAITING_FOR_FACE'; // WAITING_FOR_FACE, NOD_FOR_HAT, CAKE_IN, WISH, BLOW, FINISHED
    let hatOn = false;
    let cakeProgress = 0;
    let isWishing = false;
    let candleLit = false;
    let candleBlown = false;
    let lastNoseY = 0;
    let nodCount = 0;
    let confettis = [];
    let mediapipeReady = false;
    let lastFrameTime = 0;

    // Interaction vars
    let faceLandmarks = null;
    let handLandmarks = null;

    function showCameraError(msg) {
        document.body.innerHTML = `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;background:#0a0a0a;color:#fff;text-align:center;gap:12px;padding:24px">
            <div style="font-size:2rem">📷</div>
            <p style="font-size:1.1rem;font-weight:600">摄像头错误</p>
            <p style="opacity:0.5;font-size:0.85rem">${msg}</p>
        </div>`;
    }

    // MediaPipe Setup
    const faceMesh = new FaceMesh({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4/${file}`
    });
    faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
    faceMesh.onResults(onFaceResults);
    faceMesh.onError = (err) => { console.error('FaceMesh error:', err); };

    const hands = new Hands({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/${file}`
    });
    hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
    hands.onResults(onHandResults);

    const videoElement = document.createElement('video');
    videoElement.style.display = 'none';
    document.body.appendChild(videoElement);

    async function startCamera() {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            showCameraError('您的设备不支持摄像头');
            return;
        }

        // Mobile-friendly constraints with fallbacks
        const constraintSets = [
            { video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } } },
            { video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } } },
            { video: { facingMode: 'user' } },
            { video: true }
        ];

        let stream = null;
        for (const constraints of constraintSets) {
            try {
                stream = await navigator.mediaDevices.getUserMedia(constraints);
                break;
            } catch(e) {
                console.log('Camera constraint failed:', e);
            }
        }

        if (!stream) {
            showCameraError('无法访问摄像头，请允许摄像头权限');
            return;
        }

        videoElement.srcObject = stream;
        videoElement.setAttribute('playsinline', '');
        videoElement.setAttribute('autoplay', '');
        videoElement.setAttribute('muted', '');

        // Try to play immediately (works on most browsers including iOS Safari)
        videoElement.play().then(() => {
            loadingScreen.style.display = 'none';
            state = 'NOD_FOR_HAT';
            updateHint("点点头，戴上生日帽！🐣");

            async function detect() {
                if (videoElement.readyState >= 1) {
                    try {
                        await faceMesh.send({image: videoElement});
                        await hands.send({image: videoElement});
                        mediapipeReady = true;
                    } catch(e) {
                        console.log('MediaPipe send error (non-fatal):', e);
                    }
                }
                requestAnimationFrame(detect);
            }
            detect();

            function renderLoop() {
                draw();
                requestAnimationFrame(renderLoop);
            }
            renderLoop();
        }).catch(() => {
            // Fallback: wait for loadedmetadata then play
            videoElement.addEventListener('loadedmetadata', () => {
                videoElement.play().then(() => {
                    loadingScreen.style.display = 'none';
                    state = 'NOD_FOR_HAT';
                    updateHint("点点头，戴上生日帽！🐣");

                    async function detect() {
                        if (videoElement.readyState >= 1) {
                            try {
                                await faceMesh.send({image: videoElement});
                                await hands.send({image: videoElement});
                                mediapipeReady = true;
                            } catch(e) {
                                console.log('MediaPipe send error (non-fatal):', e);
                            }
                        }
                        requestAnimationFrame(detect);
                    }
                    detect();

                    function renderLoop() {
                        draw();
                        requestAnimationFrame(renderLoop);
                    }
                    renderLoop();
                }).catch(err => {
                    showCameraError('无法启动摄像头: ' + err.message);
                });
            });
        });
    }

    function onFaceResults(results) {
        faceLandmarks = results.multiFaceLandmarks?.[0];
        draw();
    }

    function onHandResults(results) {
        handLandmarks = results.multiHandLandmarks;
    }

    function updateHint(text) {
        hintElement.innerText = text;
        gsap.fromTo(hintElement, { scale: 0.8, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.5 });
    }

    function draw() {
        ctx.save();
        ctx.clearRect(0, 0, canvasElement.width, canvasElement.height);

        // Mirror
        ctx.translate(canvasElement.width, 0);
        ctx.scale(-1, 1);

        // Black background
        ctx.fillStyle = '#0a0a0a';
        ctx.fillRect(0, 0, canvasElement.width, canvasElement.height);

        if (faceLandmarks) {
            processInteractions();
            drawChick();
            if (hatOn) drawHat();
            if (cakeProgress > 0) drawCake();
            if (candleBlown) drawConfetti();
        } else {
            // Show waiting prompt when no face is detected
            if (mediapipeReady) {
                ctx.fillStyle = 'rgba(255,255,255,0.7)';
                ctx.font = `${Math.max(18, canvasElement.width * 0.045)}px sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('🐣 请将脸对准摄像头', canvasElement.width / 2, canvasElement.height / 2);
                ctx.font = `${Math.max(14, canvasElement.width * 0.03)}px sans-serif`;
                ctx.fillStyle = 'rgba(255,255,255,0.4)';
                ctx.fillText('确保脸部清晰可见，光线充足', canvasElement.width / 2, canvasElement.height / 2 + 40);
            } else {
                ctx.fillStyle = 'rgba(255,255,255,0.5)';
                ctx.font = `${Math.max(16, canvasElement.width * 0.04)}px sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('AI模型加载中...', canvasElement.width / 2, canvasElement.height / 2);
            }
        }

        ctx.restore();
    }

    function processInteractions() {
        const nose = faceLandmarks[1];
        const topHead = faceLandmarks[10];
        const chin = faceLandmarks[152];
        const leftEye = faceLandmarks[33];
        const rightEye = faceLandmarks[263];
        
        // 1. Nodding detection
        if (state === 'NOD_FOR_HAT') {
            let currentNoseY = nose.y;
            if (!window.baseNoseY) window.baseNoseY = currentNoseY;
            window.baseNoseY = window.baseNoseY * 0.9 + currentNoseY * 0.1; 
            
            if (Math.abs(currentNoseY - window.baseNoseY) > 0.03) {
                nodCount++;
                window.baseNoseY = currentNoseY; // reset to require another distinct movement
                if (nodCount > 5) { // reduced threshold for easier triggering
                    hatOn = true;
                    state = 'CAKE_IN';
                    updateHint("生日快乐！蛋糕来啦... 🎂");
                    
                    let animObj = { p: 0 };
                    gsap.to(animObj, { p: 1, duration: 2, ease: "back.out(1.7)", 
                        onUpdate: () => { cakeProgress = animObj.p; },
                        onComplete: () => {
                            state = 'WISH';
                            updateHint("双手合十，许个愿吧！🙏");
                        }
                    });
                }
            }
        }

        // 2. Hands Together detection
        if (state === 'WISH' && handLandmarks && handLandmarks.length >= 1) {
            let wishingDetected = false;
            if (handLandmarks.length === 2) {
                // Check distance between palms
                const h1 = handLandmarks[0][0];
                const h2 = handLandmarks[1][0];
                const dist = Math.hypot(h1.x - h2.x, h1.y - h2.y);
                if (dist < 0.2) wishingDetected = true;
            } else if (handLandmarks.length === 1) {
                // Single fist near chin
                const h1 = handLandmarks[0][0];
                const distToChin = Math.hypot(h1.x - chin.x, h1.y - chin.y);
                if (distToChin < 0.15) wishingDetected = true;
            }

            if (wishingDetected) {
                if (!isWishing) {
                    isWishing = true;
                    candleLit = true;
                    updateHint("许个愿吧... 然后张开嘴吹蜡烛！💨");
                    setTimeout(() => { 
                        if (state === 'WISH') state = 'BLOW'; 
                    }, 2000);
                }
            }
        }

        // 3. Blowing detection
        if (state === 'BLOW') {
            const upperLip = faceLandmarks[13];
            const lowerLip = faceLandmarks[14];
            const mouthOpen = Math.abs(upperLip.y - lowerLip.y);
            if (mouthOpen > 0.05) {
                candleLit = false;
                candleBlown = true;
                state = 'FINISHED';
                updateHint("🎉 生日快乐！🎉");
                createConfetti();
            }
        }
    }

    function drawChick() {
        const nose = faceLandmarks[1];
        const leftEye = faceLandmarks[33];
        const rightEye = faceLandmarks[263];
        const chin = faceLandmarks[152];
        const forehead = faceLandmarks[10];

        const faceWidth = Math.abs(rightEye.x - leftEye.x) * canvasElement.width * 3.0;
        const faceHeight = Math.abs(chin.y - forehead.y) * canvasElement.height * 1.8;
        const centerX = nose.x * canvasElement.width;
        const centerY = nose.y * canvasElement.height;

        // Body (Rounder and cuter)
        ctx.fillStyle = '#ffde34'; // Brighter Cute Yellow
        ctx.beginPath();
        ctx.ellipse(centerX, centerY + faceHeight * 0.1, faceWidth * 0.55, faceHeight * 0.55, 0, 0, Math.PI * 2);
        ctx.fill();
        
        // Fluff on top of head
        ctx.beginPath();
        ctx.ellipse(centerX, centerY - faceHeight * 0.4, faceWidth * 0.15, faceHeight * 0.1, 0, 0, Math.PI * 2);
        ctx.fill();

        // Rosy Cheeks
        ctx.fillStyle = 'rgba(255, 105, 135, 0.5)';
        ctx.beginPath();
        ctx.ellipse(centerX - faceWidth * 0.3, centerY + faceHeight * 0.1, faceWidth * 0.1, faceHeight * 0.06, 0, 0, Math.PI * 2);
        ctx.ellipse(centerX + faceWidth * 0.3, centerY + faceHeight * 0.1, faceWidth * 0.1, faceHeight * 0.06, 0, 0, Math.PI * 2);
        ctx.fill();

        const eyeRadius = faceWidth * 0.08;

        // Eyes
        ctx.fillStyle = isWishing ? '#854d0e' : '#2d1b00';
        if (isWishing) {
            // Cute closed happy eyes ^ ^
            ctx.lineWidth = 6;
            ctx.strokeStyle = '#2d1b00';
            ctx.lineCap = 'round';
            
            ctx.beginPath();
            ctx.moveTo(leftEye.x * canvasElement.width - eyeRadius, leftEye.y * canvasElement.height + eyeRadius/2);
            ctx.quadraticCurveTo(leftEye.x * canvasElement.width, leftEye.y * canvasElement.height - eyeRadius, leftEye.x * canvasElement.width + eyeRadius, leftEye.y * canvasElement.height + eyeRadius/2);
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(rightEye.x * canvasElement.width - eyeRadius, rightEye.y * canvasElement.height + eyeRadius/2);
            ctx.quadraticCurveTo(rightEye.x * canvasElement.width, rightEye.y * canvasElement.height - eyeRadius, rightEye.x * canvasElement.width + eyeRadius, rightEye.y * canvasElement.height + eyeRadius/2);
            ctx.stroke();
        } else {
            // Big anime eyes
            ctx.beginPath();
            ctx.arc(leftEye.x * canvasElement.width, leftEye.y * canvasElement.height, eyeRadius, 0, Math.PI * 2);
            ctx.arc(rightEye.x * canvasElement.width, rightEye.y * canvasElement.height, eyeRadius, 0, Math.PI * 2);
            ctx.fill();
            
            // Eye shine 1 (Big)
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(leftEye.x * canvasElement.width - eyeRadius*0.3, leftEye.y * canvasElement.height - eyeRadius*0.3, eyeRadius*0.4, 0, Math.PI * 2);
            ctx.arc(rightEye.x * canvasElement.width - eyeRadius*0.3, rightEye.y * canvasElement.height - eyeRadius*0.3, eyeRadius*0.4, 0, Math.PI * 2);
            ctx.fill();
            
            // Eye shine 2 (Small)
            ctx.beginPath();
            ctx.arc(leftEye.x * canvasElement.width + eyeRadius*0.3, leftEye.y * canvasElement.height + eyeRadius*0.3, eyeRadius*0.15, 0, Math.PI * 2);
            ctx.arc(rightEye.x * canvasElement.width + eyeRadius*0.3, rightEye.y * canvasElement.height + eyeRadius*0.3, eyeRadius*0.15, 0, Math.PI * 2);
            ctx.fill();
        }

        // Cute Beak
        const upperLip = faceLandmarks[13];
        const lowerLip = faceLandmarks[14];
        const mouthOpen = Math.abs(upperLip.y - lowerLip.y) * canvasElement.height;
        const beakW = faceWidth * 0.12;
        
        ctx.fillStyle = '#ff8c00'; // Cute Orange
        ctx.beginPath();
        // Top part of beak
        ctx.moveTo(nose.x * canvasElement.width - beakW, upperLip.y * canvasElement.height);
        ctx.quadraticCurveTo(nose.x * canvasElement.width, upperLip.y * canvasElement.height - beakW*0.5, nose.x * canvasElement.width + beakW, upperLip.y * canvasElement.height);
        
        if (mouthOpen > 5) {
            // Open mouth
            ctx.lineTo(nose.x * canvasElement.width + beakW*0.8, lowerLip.y * canvasElement.height + mouthOpen);
            ctx.quadraticCurveTo(nose.x * canvasElement.width, lowerLip.y * canvasElement.height + mouthOpen + beakW*0.5, nose.x * canvasElement.width - beakW*0.8, lowerLip.y * canvasElement.height + mouthOpen);
        } else {
            // Closed beak
            ctx.lineTo(nose.x * canvasElement.width, upperLip.y * canvasElement.height + beakW*0.8);
        }
        ctx.closePath();
        ctx.fill();
    }

    function drawHat() {
        const forehead = faceLandmarks[10];
        const nose = faceLandmarks[1];
        const centerX = forehead.x * canvasElement.width;
        const centerY = forehead.y * canvasElement.height;
        
        const angle = Math.atan2(nose.y - forehead.y, nose.x - forehead.x) - Math.PI/2;
        
        ctx.save();
        ctx.translate(centerX, centerY);
        ctx.rotate(angle);
        
        // Cone
        ctx.fillStyle = '#ff477e'; // Cute Pink
        ctx.beginPath();
        ctx.moveTo(-45, 0);
        ctx.lineTo(45, 0);
        ctx.lineTo(0, -110);
        ctx.closePath();
        ctx.fill();

        // Stripes
        ctx.fillStyle = '#ffbf69';
        ctx.beginPath();
        ctx.moveTo(-35, -20);
        ctx.lineTo(35, -20);
        ctx.lineTo(25, -40);
        ctx.lineTo(-25, -40);
        ctx.fill();
        
        ctx.beginPath();
        ctx.moveTo(-15, -60);
        ctx.lineTo(15, -60);
        ctx.lineTo(5, -80);
        ctx.lineTo(-5, -80);
        ctx.fill();

        // Pom pom
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.arc(0, -110, 16, 0, Math.PI*2);
        ctx.fill();
        
        ctx.restore();
    }

    function drawCake() {
        const w = canvasElement.width;
        const h = canvasElement.height;
        const cakeY = h - (cakeProgress * 250);
        const cakeX = w / 2;

        // Plate
        ctx.fillStyle = '#e2e8f0';
        ctx.beginPath();
        ctx.ellipse(cakeX, cakeY + 60, 120, 30, 0, 0, Math.PI * 2);
        ctx.fill();

        // Cake Layers
        ctx.fillStyle = '#fbbf24'; // Yellow cake
        ctx.fillRect(cakeX - 80, cakeY, 160, 60);
        ctx.fillStyle = '#f472b6'; // Pink frosting
        ctx.fillRect(cakeX - 85, cakeY - 10, 170, 20);
        
        // Candle
        ctx.fillStyle = '#60a5fa';
        ctx.fillRect(cakeX - 5, cakeY - 40, 10, 30);

        if (candleLit) {
            // Flame
            const flicker = Math.random() * 5;
            ctx.fillStyle = '#f97316';
            ctx.beginPath();
            ctx.moveTo(cakeX, cakeY - 45 - flicker);
            ctx.quadraticCurveTo(cakeX + 10, cakeY - 55, cakeX, cakeY - 75 - flicker);
            ctx.quadraticCurveTo(cakeX - 10, cakeY - 55, cakeX, cakeY - 45 - flicker);
            ctx.fill();
            
            ctx.fillStyle = '#fef08a';
            ctx.beginPath();
            ctx.arc(cakeX, cakeY - 55, 5, 0, Math.PI * 2);
            ctx.fill();
        } else if (candleBlown) {
            // Smoke
            ctx.fillStyle = 'rgba(255,255,255,0.3)';
            ctx.beginPath();
            ctx.arc(cakeX, cakeY - 50, 4, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    function createConfetti() {
        for (let i = 0; i < 100; i++) {
            confettis.push({
                x: Math.random() * canvasElement.width,
                y: -20,
                size: Math.random() * 10 + 5,
                color: `hsl(${Math.random() * 360}, 70%, 60%)`,
                vx: Math.random() * 4 - 2,
                vy: Math.random() * 5 + 2,
                rot: Math.random() * Math.PI * 2
            });
        }
    }

    function drawConfetti() {
        confettis = confettis.filter(p => {
            ctx.fillStyle = p.color;
            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate(p.rot);
            ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
            ctx.restore();
            p.x += p.vx;
            p.y += p.vy;
            p.rot += 0.1;
            return p.y <= canvasElement.height;
        });
    }

    function resize() {
        const vv = window.visualViewport;
        const w = vv ? Math.round(vv.width) : window.innerWidth;
        const h = vv ? Math.round(vv.height) : window.innerHeight;
        canvasElement.width = w;
        canvasElement.height = h;
    }

    window.addEventListener('resize', resize);
    if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', resize);
    }
    resize();

    // iOS Safari requires getUserMedia to be triggered by user gesture
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
    if (isIOS) {
        document.getElementById('start-btn').style.display = 'inline-block';
    } else {
        startCamera();
    }

</script>
</body>
</html>
